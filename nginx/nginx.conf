# Global nginx settings
worker_processes auto;   # automatically match number of CPU cores

events {
    worker_connections 1024;   # max simultaneous connections per worker
}

http {

    # ─────────────────────────────────────────
    # REAL IP: Trust Docker's internal network
    # so nginx sees the real client IP, not Docker's gateway
    # ─────────────────────────────────────────
    set_real_ip_from  172.16.0.0/12;    # Docker internal IP range
    set_real_ip_from  127.0.0.1;        # localhost
    real_ip_header    X-Forwarded-For;  # read real IP from this header
    real_ip_recursive on;               # peel back multiple proxy hops

    # ─────────────────────────────────────────
    # JSON LOG FORMAT — required by the task spec
    # Every field the task asks for is here
    # ─────────────────────────────────────────
    log_format json_log escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    # Write access log in JSON format to the required path
    access_log /var/log/nginx/hng-access.log json_log;
    error_log  /var/log/nginx/error.log warn;

    # ─────────────────────────────────────────
    # SERVER BLOCK — handles incoming HTTP traffic
    # ─────────────────────────────────────────
    server {
        listen 80;               # listen on port 80
        server_name _;           # accept any hostname/IP

        # Pass ALL traffic to Nextcloud container
        location / {
            proxy_pass         http://nextcloud:80;      # nextcloud service name from docker-compose
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }
}